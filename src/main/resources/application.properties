spring.datasource.url=jdbc:mysql://localhost:3306/smartcampus_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.hide.banner=true
server.port=8082

# JWT Configuration
smartcampus.app.jwtSecret=smartCampusSecretKeyShouldBeLongEnoughForHS256AlgorithmToWorkCorrectly1234567890
smartcampus.app.jwtExpirationMs=86400000

# File Upload Configuration
file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
